name: Bug 报告
description: 报告一个 bug
labels: ["type: bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰描述遇到的问题
      placeholder: "发生了什么..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题
      placeholder: |
        1. 启动后端...
        2. 访问...
        3. 点击...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么

  - type: textarea
    id: logs
    attributes:
      label: 日志/截图
      description: 相关日志或截图
      placeholder: "粘贴日志或截图..."

  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: 运行环境信息
      value: |
        - OS:
        - Python:
        - Node:
