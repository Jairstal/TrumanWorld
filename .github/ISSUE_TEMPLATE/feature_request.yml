name: 功能需求
description: 提出一个新功能需求
labels: ["type: feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 背景/问题
      description: 这个功能要解决什么问题
      placeholder: "作为用户，我希望..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 你希望如何实现
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 其他可能的实现方式

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - P1 - 高
        - P2 - 中
        - P3 - 低
      default: 1

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 其他相关信息、参考链接等
